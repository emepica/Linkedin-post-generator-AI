<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Generator</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header>
        <h1>LinkedIn Post Generator</h1>
    </header>
    <main>
        <p>Enter the content for your LinkedIn post below and click "Generate Post" to see the formatted output.</p>
        <input id="postInput" placeholder="What do you want to share on LinkedIn?" autofocus required></input>
        <input type="submit" onclick="generatePost()" value="Generate Post">
        <div id="output"></div>
    </main>
<footer>
        <p>&copy; 2026 LinkedIn Post Generator. Coded By Emeline Picard | Open-sourced on GitHub | Hosted on Netlify.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
